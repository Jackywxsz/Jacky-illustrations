    .line{fill:none;stroke:#111;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}
    .thin{fill:none;stroke:#111;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
    .green{fill:#d7ed57;stroke:#111;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}
    .accent{fill:none;stroke:#e8612c;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
    .blue{fill:none;stroke:#2f6fb3;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
    .note{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:30px;fill:#111}
    .small{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:22px;fill:#555}
  </style>

  <text x="88" y="84" class="note">Jacky 小芽哥：白色豆豆体型 + 头顶嫩芽 + 可选墨镜</text>
  <text x="88" y="123" class="small">潇洒但不油腻；有活力但不幼稚；永远服务正文里的核心动作。</text>

